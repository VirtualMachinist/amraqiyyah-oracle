<!-- @dsCard group="Spacing" viewport="700x180" name="Elevation — glow, not shadow" subtitle="The trim reads as light; lift = a soft halo" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--bg);padding:20px;font-family:var(--font-body);color:var(--text)}.cap{font-family:var(--font-mono);font-size:10px;letter-spacing:.08em;color:var(--dim);margin-top:4px}</style></head><body class="aq-field"><div style="display:flex;gap:20px;flex-wrap:wrap;align-items:center">
    <div style="width:120px;height:64px;border-radius:var(--radius-md);border:1px solid var(--gold);box-shadow:var(--glow-gold);display:flex;align-items:center;justify-content:center;color:var(--gold);font-family:var(--font-mono);font-size:11px">--glow-gold</div>
    <div style="width:120px;height:64px;border-radius:var(--radius-md);border:1px solid var(--lapis-light);box-shadow:var(--glow-lapis);display:flex;align-items:center;justify-content:center;color:var(--lapis-light);font-family:var(--font-mono);font-size:11px">--glow-lapis</div>
    <div style="width:120px;height:64px;border-radius:var(--radius-md);background:var(--panel);box-shadow:var(--shadow-drop);display:flex;align-items:center;justify-content:center;color:var(--dim);font-family:var(--font-mono);font-size:11px">--shadow-drop</div>
  </div></body></html>
