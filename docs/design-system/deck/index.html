<!-- @dsCard group="Deck" viewport="1240x820" name="The 78-Card Deck" subtitle="All five strata + uniform back, fully rendered" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>The Amraqiyyah Oracle — The 78 Cards</title>
<link rel="stylesheet" href="../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../_ds_bundle.js"></script>
<style>
  body{margin:0;background:var(--bg);font-family:var(--font-body);color:var(--text);padding:36px 40px 80px}
  .eyebrow{font-family:var(--font-mono);font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--dim)}
  h1{font-family:var(--font-display);font-weight:700;font-size:38px;color:var(--gold);margin:6px 0 2px}
  .sub{font-family:var(--font-display);font-style:italic;font-size:18px;color:var(--lapis-light);margin:0 0 8px}
  .note{font-size:14px;color:var(--dim);max-width:760px;line-height:1.6}
  h2{font-family:var(--font-display);font-weight:700;font-size:24px;color:var(--copper-light);margin:44px 0 2px}
  .stratum-note{font-size:13px;color:var(--dim);margin:0 0 16px;max-width:760px}
  .grid{display:flex;flex-wrap:wrap;gap:18px;align-items:flex-start}
</style>
</head>
<body class="aq-field">
<div id="root"></div>
<script type="text/babel">
const W = 228;
// Resilient to a stale cached bundle: if DeckCard is missing, re-fetch with a cache-buster.
function withNS(cb) {
  const ns = window.AmraqiyyahOracleDesignSystem_484c79;
  const fresh = ns && ns.DeckCard && ns.DECK && ns.DECK[29] && ns.DECK[29].divineAr; // field-card Arabic marks the current build
  if (fresh) { cb(ns); return; }
  const s = document.createElement("script");
  s.src = "../_ds_bundle.js?v=" + Date.now();
  s.onload = () => cb(window.AmraqiyyahOracleDesignSystem_484c79);
  document.head.appendChild(s);
}
let DeckCard;
function Section({ title, note, cards, children }) {
  return (<section>
    <h2>{title}</h2>
    <p className="stratum-note">{note}</p>
    <div className="grid">{children || cards.map((n) => <DeckCard key={n} card={n} width={W}/>)}</div>
  </section>);
}
function Gallery() {
  const range = (a, b) => Array.from({ length: b - a + 1 }, (_, i) => a + i);
  return (<div>
    <p className="eyebrow">Al-Tariqa Amraqiyyah · Oracle Deck v1.0 · Deck Design</p>
    <h1>The Seventy-Eight Cards</h1>
    <p className="sub">Five strata · uniform backs · split faces · sideways Agents</p>
    <p className="note">Card faces follow the Hedronite glass-polyhedron language — lapis glass, copper edges, glowing vertices —
      with Mdw Ntr accents honouring the Kemetic root (Canon §13.4). Every assignment is verbatim from the ratified
      specification: mansions, letters, Abjad values, Divine Names, threshold pairs, and the 7×7 field.</p>
    <Section title="The Uniform Back" note="All 78 cards share one back — rotationally symmetric, so no draw leaks its orientation.">
      <DeckCard card="back" width={W}/>
    </Section>
    <Section title="Stratum I — The Stellar Court (1–3)" note="Never drawn, never shuffled. Placed at the centre only when the sky's own conditions are active. Djed — the unmoved pillar; Seba — the witness star; Per — the opened gate." cards={[1,2,3]}/>
    <Section title="Stratum II — The Planetary Council (4–10)" note="Split faces: the yang half (Pleiadian — planet over Gen) and the yin half (Sirian — Gen over planet) carry all 14 threshold hexagrams. Drawn as the Agent and placed sideways." cards={range(4,10)}/>
    <Section title="Stratum III — The Platonic Keys (11–15)" note="Drawn first in every reading; never suspended. The five solids of the Timaeus name the question's element and point to the Zabur Book." cards={range(11,15)}/>
    <Section title="Stratum IV — The Archimedean Bridges (16–28)" note="Yang region: the Archimedean solid (vertex-transitive, expressive). Yin region: its Catalan dual (face-transitive, receptive). Bridges 7 and 13 are chiral ⟳ — handedness is set by lunar illumination." cards={range(16,28)}/>
    <Section title="Stratum V — The Hexagram Field (29–78)" note="The permanent Axial Witness (Hex 52) and the 49 drawable hexagrams of the 7×7 matrix, suit by upper trigram: Earth → Fire → Ether → Air → Water. Pure Resonance cards ring their figure; Card 54 is the Solar Crown." cards={range(29,78)}/>
  </div>);
}
withNS((NS) => {
  DeckCard = NS.DeckCard;
  ReactDOM.createRoot(document.getElementById("root")).render(<Gallery/>);
});
</script>
</body>
</html>
