<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>body{margin:0;background:var(--bg);padding:22px;font-family:var(--font-body)}.grp{margin-bottom:20px}.lbl{font-family:var(--font-mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);margin-bottom:10px}.row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}</style>
</head>
<body class="aq-field">
<div id="root"></div>
<script type="text/babel">
const { Button, TabBar, SegmentedControl, VeilSelector, Field } = window.AmraqiyyahOracleDesignSystem_484c79;
function Demo(){
  const [tab,setTab]=React.useState("reading");
  const [mode,setMode]=React.useState("A");
  const [veil,setVeil]=React.useState(5);
  const [q,setQ]=React.useState("");
  return (<div>
    <div className="grp"><div className="lbl">Button — primary · ghost · sunken · disabled</div>
      <div className="row">
        <Button>Read the sky</Button>
        <Button variant="ghost">Use my location</Button>
        <Button variant="sunken" size="sm">‹ Texts</Button>
        <Button disabled>Saved to journal</Button>
      </div></div>
    <div className="grp"><div className="lbl">TabBar</div>
      <TabBar tabs={[{key:"now",label:"Now"},{key:"reading",label:"Reading"},{key:"texts",label:"Texts"},{key:"natal",label:"Natal"},{key:"journal",label:"Journal"}]} active={tab} onChange={setTab}/></div>
    <div className="grp"><div className="lbl">SegmentedControl</div>
      <SegmentedControl options={[{value:"A",label:"A — Astronomical"},{value:"B",label:"B — Deck"},{value:"C",label:"C — Resonance"}]} value={mode} onChange={setMode}/></div>
    <div className="grp"><div className="lbl">VeilSelector — question depth 1–9</div>
      <VeilSelector value={veil} onChange={setVeil}/></div>
    <div className="grp"><div className="lbl">Field</div>
      <Field value={q} onChange={setQ} placeholder="The question (optional)"/></div>
  </div>);
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo/>);
</script>
</body>
</html>
